name: Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-development:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-core

      - name: Create directories with proper permissions
        run: |
          mkdir -p certs logs
          chmod 777 certs logs
          sudo chown -R 1000:1000 certs logs

      - name: Build and start services with docker compose
        env:
          PORT: 8443
        run: |
          docker compose up --build -d
          sleep 10  # Wait for services to start

      - name: Show server logs
        run: docker compose logs python-cloud-server

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -k https://localhost:8443/api/metrics; then
              echo "Health check passed"
              break
            else
              echo "Health check failed, attempt $i/5"
              if [ $i -eq 5 ]; then
                exit 1
              fi
              sleep 10
            fi
          done

      - uses: ./.github/actions/check-docker-containers

      - name: Stop services
        run: docker compose down

  docker-production:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-core

      - name: Create directories with proper permissions
        run: |
          mkdir -p certs logs
          chmod 777 certs logs
          sudo chown -R 1000:1000 certs logs

      - name: Build production image
        run: |
          docker build --build-arg ENV=prod --build-arg PORT=443 -t python-cloud-server:prod .

      - name: Start services with docker compose
        env:
          IMAGE_TAG: prod
          PORT: 443
        run: |
          docker compose up -d
          sleep 10  # Wait for container to start

      - name: Show server logs
        run: docker logs python-cloud-server

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -k https://localhost:443/api/metrics; then
              echo "Health check passed"
              break
            else
              echo "Health check failed, attempt $i/5"
              if [ $i -eq 5 ]; then
                exit 1
              fi
              sleep 10
            fi
          done

      - uses: ./.github/actions/check-docker-containers

      - name: Stop services
        run: docker compose down
