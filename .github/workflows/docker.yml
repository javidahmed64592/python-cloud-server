name: Docker

on:
  push:
    branches:
      - main
      - add-docker
  pull_request:
    branches:
      - main

jobs:
  docker-compose-dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install dependencies
        run: |
          uv sync

      - name: Generate  API token hash
        run: |
          uv run generate-new-token
          # Retrieve API_TOKEN_HASH from the generated .env file
          API_TOKEN_HASH=$(grep API_TOKEN_HASH .env | cut -d '=' -f2)
          echo "API_TOKEN_HASH=$API_TOKEN_HASH" >> $GITHUB_ENV

      - name: Build and start services with docker-compose
        run: |
          docker compose up --build -d
          sleep 30  # Wait for services to start

      - name: Check if services are running
        run: docker compose ps

      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -k https://localhost:8443/api/metrics; then
              echo "Health check passed"
              break
            else
              echo "Health check failed, attempt $i/5"
              if [ $i -eq 5 ]; then
                exit 1
              fi
              sleep 10
            fi
          done

      - name: Stop services
        run: docker compose down
